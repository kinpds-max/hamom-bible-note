<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하맘말씀노트 Pro - 하이엔드 성경노트</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Pretendard:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="silver-mode">
    <div id="app">
        
        <!-- Navigation Sidebar -->
        <aside id="sidebar">
            <div class="logo">
                <div class="logo-icon">🌿</div>
                <h1>하맘말씀노트</h1>
                <p>Premium Bible Note</p>
            </div>
            
            <div class="search-bar">
                <input type="text" id="bibleSearch" placeholder="성경 검색 (예: 창 1:1)">
            </div>
 
            <nav id="bookList">
                <div class="testament-header">구약성경</div>
                <div id="oldTestament" class="books-grid"></div>
                <div class="testament-header">신약성경</div>
                <div id="newTestament" class="books-grid"></div>
            </nav>
 
            <div class="sidebar-footer">
                <div class="theme-switch" style="margin-bottom: 10px; display: flex; gap: 5px;">
                    <button id="darkThemeBtn" class="btn-sm">Dark</button>
                    <button id="silverThemeBtn" class="btn-sm active">Silver</button>
                </div>
                <button id="importBtn" class="btn secondary">성경 데이터 불러오기</button>
                <input type="file" id="fileInput" multiple hidden accept=".txt">
                <div class="app-version">Version 2.0 (Powered by AI)</div>
                <p class="copyright">© 2026 하맘 Pro</p>
            </div>
        </aside>
 
        <!-- Main Content Area -->
        <main id="mainContent">
            <!-- Bible Viewer Pane -->
            <section id="biblePane" class="pane">
                <header class="pane-header">
                    <h2 id="currentLocation">창세기 1장</h2>
                    <div class="chapter-nav">
                        <button id="prevChapter" class="icon-btn">&lsaquo;</button>
                        <select id="chapterSelect"></select>
                        <button id="nextChapter" class="icon-btn">&rsaquo;</button>
                    </div>
                </header>
                <div id="verseList" class="verse-container">
                    <!-- Verses load here -->
                </div>
                
                <div id="selectionToolbar" class="selection-toolbar hidden">
                    <span id="selectedCount">0개 선택됨</span>
                    <button id="addSelectedToNote" class="btn primary">노트로 본문 전송</button>
                    <button id="highlightSelected" class="btn secondary">✨ 하이라이트</button>
                </div>
            </section>
 
            <!-- Divider -->
            <div class="divider"></div>
 
            <!-- Bible Note Pane -->
            <section id="notePane" class="pane">
                <header class="pane-header">
                    <div class="note-meta">
                        <input type="text" id="noteTitle" placeholder="설교 제목을 입력하세요..." class="note-title-input">
                        <div class="note-subtitle">
                            <span id="noteDateDisplay">2026. 03. 28</span>
                        </div>
                    </div>
                    <div class="note-actions">
                        <button id="saveNote" class="btn primary">저장</button>
                        <button id="shareNote" class="btn secondary">공유</button>
                    </div>
                </header>
 
                <!-- Premium Feature Bar -->
                <div class="feature-bar">
                    <button id="aiSummaryBtn" class="feature-btn">🤖 AI 요약</button>
                    <button id="notebookLMBtn" class="feature-btn">📖 NotebookLM</button>
                    <button id="voiceRecordBtn" class="feature-btn">🎙️ 설교 녹음</button>
                </div>
 
                <div class="note-editor-wrapper">
                    <div class="note-editor-container">
                        <div id="quotedVerses" class="quoted-verses-list">
                            <div class="quoted-verses-placeholder">성경 구절을 선택해 이곳으로 보내세요</div>
                        </div>
                        
                        <div class="content-area">
                            <textarea id="noteContent" placeholder="여기에 설교 내용을 기록하세요..."></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="note-footer-tabs">
                    <div class="note-list-mini">
                        <div class="footer-tab-header">최근 설교 목록</div>
                        <div id="savedNotesList" class="mini-notes-scroll"></div>
                    </div>
                    
                    <div class="footer-details">
                        <div class="memo-mini">
                            <div class="footer-tab-header">오늘의 메모</div>
                            <textarea id="generalMemo" placeholder="기타 영감이나 기도 제목을 적어보세요..."></textarea>
                        </div>
                        <div class="calendar-mini">
                            <div id="calendarGrid" class="calendar-mini-grid"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
 
    <!-- Overlays -->
    <div id="loadingOverlay" class="overlay hidden">
        <div class="modal">
            <div class="spinner"></div>
            <h3 id="loadingText">처리 중...</h3>
            <div id="loadingProgress" class="progress-bar-container">
                <div id="importProgress" class="progress-bar"></div>
            </div>
        </div>
    </div>
 
    <script type="module" src="app.js"></script>
</body>
</html>
