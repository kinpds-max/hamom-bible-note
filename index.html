<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>하맘 성경노트 Pro — Hamom Bible Note</title>
    <meta name="description" content="하맘 성경노트 Pro - 애플 실버 디자인으로 구현된 프리미엄 성경 말씀 노트 앱. 설교, 묵상, 기도를 체계적으로 기록하세요.">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <!-- Google Fonts: SF Pro Display alternative -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Status Bar Spacer (for PWA feel) -->
    <div class="status-bar-spacer"></div>

    <div id="app">
        <!-- ===== Top Navigation Bar (Apple-style) ===== -->
        <header id="top-bar" class="top-bar">
            <div class="top-bar-left">
                <button id="menu-btn" class="icon-btn" aria-label="메뉴">
                    <ion-icon name="ellipsis-horizontal"></ion-icon>
                </button>
            </div>
            <div class="top-bar-center">
                <h1 class="app-title">
                    <span class="title-icon">✦</span>
                    하맘 성경노트
                    <span class="title-badge">PRO</span>
                </h1>
            </div>
            <div class="top-bar-right">
                <div id="auto-save-indicator" class="save-dot"></div>
            </div>
        </header>

        <!-- ===== Meta Info Strip ===== -->
        <div class="meta-strip">
            <div class="meta-chip active" id="meta-date-chip">
                <ion-icon name="calendar-outline"></ion-icon>
                <input type="date" id="note-date">
            </div>
            <div class="meta-chip" id="meta-theme-chip">
                <ion-icon name="pricetag-outline"></ion-icon>
                <input type="text" id="note-theme" placeholder="말씀 주제">
            </div>
            <select id="note-category" class="category-select">
                <option value="sermon">🎙 설교</option>
                <option value="faith">✝ 신앙</option>
                <option value="prayer">🙏 기도</option>
            </select>
        </div>

        <!-- ===== Content Area (Tab-Based) ===== -->
        <main id="content-area" class="content-area">
            <!-- Tab: Bible Search -->
            <section id="tab-bible" class="tab-panel active">
                <div class="search-container">
                    <div class="apple-search-bar">
                        <ion-icon name="search" class="search-icon"></ion-icon>
                        <input type="text" id="bible-search" placeholder="구절 검색 (예: 창 1:1, 사랑, 은혜...)">
                        <button id="search-btn" class="search-clear-btn" aria-label="검색">
                            <ion-icon name="arrow-forward-circle"></ion-icon>
                        </button>
                    </div>
                    <div class="quick-selectors">
                        <select id="book-select" class="apple-select">
                            <option value="">성경 선택</option>
                        </select>
                        <select id="chapter-select" class="apple-select">
                            <option value="">장</option>
                        </select>
                    </div>
                    <!-- Version Selector -->
                    <div class="version-selector">
                        <label class="version-chip">
                            <input type="radio" name="translation" value="kr" checked>
                            <span>개역개정</span>
                        </label>
                        <label class="version-chip">
                            <input type="radio" name="translation" value="easy">
                            <span>쉬운성경</span>
                        </label>
                        <label class="version-chip">
                            <input type="radio" name="translation" value="niv">
                            <span>NIV</span>
                        </label>
                        <label class="version-chip">
                            <input type="radio" name="translation" value="both">
                            <span>같이보기</span>
                        </label>
                    </div>
                </div>

                <div id="verse-list" class="verse-list">
                    <div class="empty-state">
                        <ion-icon name="book-outline" class="empty-icon"></ion-icon>
                        <p>성경 책과 장을 선택하거나<br>검색어를 입력하세요</p>
                    </div>
                </div>

                <!-- Floating UI Actions -->
                <div id="bible-fab-container" class="fab-container" style="display:none;">
                    <button id="push-to-note-btn" class="fab-push">
                        <ion-icon name="paper-plane-outline"></ion-icon>
                        <span id="push-count">0</span>구절 노트로 보내기
                    </button>
                    <div class="fab-secondary-actions">
                        <button id="bible-highlight-btn" class="fab-mini" title="하이라이트">
                            <ion-icon name="brush-outline"></ion-icon>
                        </button>
                        <button id="bible-share-btn" class="fab-mini" title="공유">
                            <ion-icon name="share-social-outline"></ion-icon>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Tab: Note Editor -->
            <section id="tab-note" class="tab-panel">
                <!-- Inline Toolbar -->
                <div class="note-toolbar">
                    <button id="record-btn" class="tool-btn" title="음성 녹음">
                        <ion-icon name="mic-outline"></ion-icon>
                    </button>
                    <button id="tts-btn" class="tool-btn" title="텍스트 읽어주기">
                        <ion-icon name="volume-high-outline"></ion-icon>
                    </button>
                    <button id="bookmark-btn" class="tool-btn" title="책갈피">
                        <ion-icon name="bookmark-outline"></ion-icon>
                    </button>
                    <button id="highlight-btn" class="tool-btn highlight" title="하이라이트">
                        <ion-icon name="brush-outline"></ion-icon>
                    </button>
                    <div class="toolbar-divider"></div>
                    <button id="ai-summary-btn" class="tool-btn ai" title="AI 요약">
                        <ion-icon name="sparkles-outline"></ion-icon>
                        <span>AI 요약</span>
                    </button>
                    <button id="save-btn" class="tool-btn save" title="저장">
                        <ion-icon name="checkmark-circle"></ion-icon>
                    </button>
                </div>

                <!-- Selected Verses (Collapsible) -->
                <div class="verses-accordion">
                    <button id="verses-toggle" class="accordion-header">
                        <span>
                            <ion-icon name="documents-outline"></ion-icon>
                            인용된 말씀 <span id="verse-count-badge" class="count-badge">0</span>
                        </span>
                        <ion-icon name="chevron-down-outline" class="accordion-chevron"></ion-icon>
                    </button>
                    <div id="selected-verses" class="accordion-body">
                        <p class="empty-hint">성경에서 체크한 구절이 여기에 추가됩니다</p>
                    </div>
                </div>

                <!-- Rich Editor -->
                <div id="editor-container" class="editor-wrapper">
                    <div id="note-memo" class="note-editor-field" contenteditable="true"
                         data-placeholder="설교 내용이나 묵상 내용을 자유롭게 기록하세요..."></div>
                </div>
            </section>

            <!-- Tab: Calendar & History -->
            <section id="tab-calendar" class="tab-panel">
                <div class="calendar-card">
                    <div id="calendar-widget" class="calendar-widget">
                        <!-- Calendar rendered here -->
                    </div>
                </div>
                <div class="calendar-legend">
                    <span class="legend-item"><span class="legend-dot sermon"></span>설교</span>
                    <span class="legend-item"><span class="legend-dot faith"></span>신앙</span>
                    <span class="legend-item"><span class="legend-dot prayer"></span>기도</span>
                </div>
                <div class="history-section">
                    <h3 class="section-title">기록된 노트</h3>
                    <div id="notes-on-date" class="notes-list">
                        <div class="empty-state small">
                            <ion-icon name="document-text-outline"></ion-icon>
                            <p>날짜를 선택하여 저장된 노트를 확인하세요</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- ===== Bottom Tab Bar (Apple-style) ===== -->
        <nav class="tab-bar" id="tab-bar">
            <button class="tab-item active" data-tab="tab-bible">
                <ion-icon name="book-outline" class="tab-icon"></ion-icon>
                <ion-icon name="book" class="tab-icon-active"></ion-icon>
                <span>성경</span>
            </button>
            <button class="tab-item" data-tab="tab-note">
                <ion-icon name="create-outline" class="tab-icon"></ion-icon>
                <ion-icon name="create" class="tab-icon-active"></ion-icon>
                <span>노트</span>
            </button>
            <button class="tab-item" data-tab="tab-calendar">
                <ion-icon name="calendar-outline" class="tab-icon"></ion-icon>
                <ion-icon name="calendar" class="tab-icon-active"></ion-icon>
                <span>달력</span>
            </button>
        </nav>

        <!-- Footer Disclaimer -->
        <div class="app-footer">
            <div class="footer-bottom">
                <span class="footer-brand">하맘 성경노트 PRO</span>
                <span class="footer-info">하맘컨텐츠 1660-1195</span>
            </div>
            <p class="disclaimer">비배포용 (테스트 목적)</p>
        </div>
    </div>

    <!-- ===== AI Summary Modal ===== -->
    <div id="ai-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h2><ion-icon name="sparkles"></ion-icon> AI 영적 통찰 요약</h2>
                <button id="close-modal" class="modal-close-btn">
                    <ion-icon name="close-circle"></ion-icon>
                </button>
            </div>
            <div id="summary-result" class="modal-body">
                <!-- Summary content -->
            </div>
            <div class="modal-actions">
                <button id="copy-summary-btn" class="action-btn primary">
                    <ion-icon name="copy-outline"></ion-icon> 본문 복사
                </button>
            </div>
        </div>
    </div>

    <!-- ===== Context Menu (Slide-up) ===== -->
    <div id="menu-overlay" class="menu-overlay">
        <div class="menu-sheet">
            <div class="menu-handle"></div>
            <button class="menu-item" id="share-note-btn">
                <ion-icon name="share-outline"></ion-icon>
                <span>노트 공유하기</span>
            </button>
            <button class="menu-item" id="export-notebook-btn">
                <ion-icon name="cloud-upload-outline"></ion-icon>
                <span>NotebookLM 내보내기</span>
            </button>
            <button class="menu-item" id="menu-close-btn">
                <ion-icon name="close-outline"></ion-icon>
                <span>닫기</span>
            </button>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
